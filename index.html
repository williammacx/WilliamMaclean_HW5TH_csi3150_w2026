<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Used Car Dealership</title>
  
</head>
<body>

  <header>
    <h1>Used Car Dealership</h1>
  </header>

  <main>
    <section class="filters">
      <input type="number" id="minYear" placeholder="Min Year">
      <input type="number" id="maxYear" placeholder="Max Year">

      <select id="make" multiple></select>

      <input type="number" id="maxMileage" placeholder="Max Mileage">

      <input type="number" id="minPrice" placeholder="Min Price">
      <input type="number" id="maxPrice" placeholder="Max Price">

      <select id="color" multiple></select>

      <button id="filterBtn">Apply Filters</button>
    </section>

    <section id="message"></section>

    <section id="car-list"></section>
  </main>

<link rel="stylesheet" href="style.css">
<script src="usedCars.js"></script>
<script src="main.js"></script>

</body>
</html>
